---
- name: Converge
  hosts: all
  become: true

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        force_apt_get: true
      changed_when: false
      when: ansible_facts['os_family'] == 'Debian'

  roles:
    - role: realtime.docker_phpbb
