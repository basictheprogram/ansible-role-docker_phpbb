---
- name: Install | create compose directory
  ansible.builtin.file:
    path: "{{ phpbb_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install | render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ phpbb_compose_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify:
    - Restart phpbb
    - Restart mysql

- name: Install | render .env.secrets
  ansible.builtin.template:
    src: env.secrets.j2
    dest: "{{ phpbb_compose_dir }}/.env.secrets"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify:
    - Restart phpbb
    - Restart mysql
